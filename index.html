<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>情侣日记本</title>
    <link rel="stylesheet" href="./styles.css?v=22" />
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="./config.js?v=1"></script>
  </head>
  <body>
    <main class="phone-shell">
      <section id="auth-screen" class="screen auth-screen">
        <div class="auth-card">
          <p class="eyebrow">Couple Diary</p>
          <h1>满满的日记</h1>
          <p class="auth-subtitle">把两个人的小日子，稳稳保存下来。</p>

          <div class="segmented">
            <button id="show-login" class="segment active" type="button">登录</button>
            <button id="show-signup" class="segment" type="button">注册</button>
          </div>

          <form id="auth-form" class="form">
            <label>
              邮箱
              <input id="email" type="email" autocomplete="email" required placeholder="you@example.com" />
            </label>
            <label>
              密码
              <input id="password" type="password" autocomplete="current-password" required minlength="6" placeholder="至少 6 位" />
            </label>
            <button id="auth-submit" class="primary-button" type="submit">登录</button>
          </form>
          <p id="auth-message" class="message"></p>
        </div>
      </section>

      <section id="app-screen" class="screen app-screen hidden">
        <div class="content">
          <section id="page-diary" class="page diary-page active">
            <header class="topbar">
              <h1 class="page-title">我们的日记</h1>
              <div class="top-actions">
                <button id="toggle-search" class="square-button" type="button" aria-label="搜索">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="M16.5 16.5 21 21"></path></svg>
                </button>
                <button id="top-new-entry-button" class="square-button primary-square" type="button" aria-label="写日记">+</button>
              </div>
            </header>

            <div class="diary-filters">
              <button class="filter-chip active" data-filter="all" type="button">全部</button>
              <button class="filter-chip" data-filter="dabao" type="button">大宝的</button>
              <button class="filter-chip" data-filter="xiaobao" type="button">小宝的</button>
            </div>

            <div id="diary-search" class="diary-search">
              <input id="diary-search-input" type="search" placeholder="搜索日记、心情、地点..." />
            </div>

            <div id="diary-list" class="timeline"></div>
          </section>

          <section id="page-memory" class="page memory-page">
            <h1 class="page-title plain-title">回忆</h1>
            <div id="memory-list" class="memory-list"></div>
          </section>

          <section id="page-calendar" class="page calendar-page">
            <h1 class="page-title plain-title">日历</h1>
            <div class="calendar-card">
              <div class="calendar-title">
                <button id="prev-month" class="month-button" type="button" aria-label="上个月">‹</button>
                <h2 id="calendar-month">2026年5月</h2>
                <button id="next-month" class="month-button" type="button" aria-label="下个月">›</button>
              </div>
              <div class="weekdays">
                <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
              </div>
              <div id="calendar-grid" class="calendar-grid"></div>
              <div id="calendar-selected" class="calendar-selected"></div>
            </div>
          </section>

          <section id="page-settings" class="page settings-page">
            <h1 class="page-title plain-title settings-title">设置</h1>

            <div class="theme-card">
              <h3>主题颜色</h3>
              <div class="theme-grid">
                <button class="theme-chip active" data-theme="rose" type="button" aria-label="经典"></button>
                <button class="theme-chip" data-theme="pink" type="button" aria-label="玫粉"></button>
                <button class="theme-chip" data-theme="sakura" type="button" aria-label="樱粉"></button>
                <button class="theme-chip" data-theme="ink" type="button" aria-label="水墨"></button>
                <button class="theme-chip" data-theme="sea" type="button" aria-label="浅海"></button>
              </div>
            </div>

            <div class="settings-list">
              <button id="edit-name" class="setting-row" type="button">
                <span class="setting-icon">👤</span>
                <span><strong>更改显示名</strong><small><span id="profile-name">宝贝</span> · <span id="profile-email">管理个人信息</span></small></span>
                <span class="chevron">›</span>
              </button>
              <div class="setting-row static-row">
                <span class="setting-icon">📘</span>
                <span><strong>日记统计</strong><small><span id="my-count">0</span> 篇日记 · <span id="photo-count">0</span> 张照片</small></span>
                <span></span>
              </div>
              <div class="setting-row static-row">
                <span class="setting-icon">💙</span>
                <span><strong>情侣日记本</strong><small id="members-list">共同记录</small></span>
                <span></span>
              </div>
              <button id="dark-mode-toggle" class="setting-row" type="button">
                <span class="setting-icon">🌙</span>
                <span><strong>暗黑模式</strong><small id="dark-mode-status">已关闭</small></span>
                <span class="switch" aria-hidden="true"><span></span></span>
              </button>
              <label class="setting-row input-row">
                <span class="setting-icon">🔐</span>
                <span><strong>邀请码</strong><input id="book-code" readonly /></span>
              </label>
              <label class="setting-row input-row join-setting">
                <span class="setting-icon">➕</span>
                <span><strong>加入对方日记本</strong><input id="join-code" placeholder="粘贴对方邀请码" /></span>
                <button id="join-book" type="button">加入</button>
              </label>
              <button id="export-pdf" class="setting-row" type="button">
                <span class="setting-icon">💾</span>
                <span><strong>数据备份</strong><small>下载 JSON 备份</small></span>
                <span class="chevron">›</span>
              </button>
              <button id="logout" class="setting-row" type="button">
                <span class="setting-icon">❓</span>
                <span><strong>退出登录</strong><small>Couple Diary for 满满</small></span>
                <span class="chevron">›</span>
              </button>
            </div>

            <p class="footer-note">Couple Diary for 满满</p>
          </section>
        </div>

        <nav class="tabbar">
          <button class="tab active" data-page="diary" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.5 5.2h5.7c1.6 0 2.8 1.2 2.8 2.8v11.2c-.7-.9-1.7-1.3-3-1.3H4.5z"></path><path d="M19.5 5.2h-5.7C12.2 5.2 11 6.4 11 8v11.2c.7-.9 1.7-1.3 3-1.3h5.5z"></path></svg>
            <span>日记</span>
          </button>
          <button class="tab" data-page="memory" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.5 8.7c0-2.3-1.8-4-4-4-1.8 0-3.1 1-4.5 2.6-1.4-1.6-2.7-2.6-4.5-2.6-2.2 0-4 1.7-4 4 0 4.5 6.2 8.6 8.5 10.4 2.3-1.8 8.5-5.9 8.5-10.4z"></path></svg>
            <span>回忆</span>
          </button>
          <button class="tab framed" data-page="calendar" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7.5 3.8v3"></path><path d="M16.5 3.8v3"></path><rect x="4.5" y="5.8" width="15" height="14" rx="3"></rect><path d="M4.5 10h15"></path></svg>
            <span>日历</span>
          </button>
          <button class="tab framed" data-page="settings" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4z"></path><path d="M18.5 13.8c.1.4.3.8.6 1.1l.1.1a1.9 1.9 0 0 1-2.7 2.7l-.1-.1c-.3-.3-.7-.5-1.1-.6-.4.2-.8.3-1.2.5-.2.3-.3.8-.3 1.2v.2a1.9 1.9 0 0 1-3.8 0v-.2c0-.4-.1-.9-.3-1.2-.4-.1-.8-.3-1.2-.5-.4.1-.8.3-1.1.6l-.1.1A1.9 1.9 0 0 1 4.8 15l.1-.1c.3-.3.5-.7.6-1.1-.2-.4-.3-.8-.5-1.2-.3-.2-.8-.3-1.2-.3h-.2a1.9 1.9 0 0 1 0-3.8h.2c.4 0 .9-.1 1.2-.3.1-.4.3-.8.5-1.2-.1-.4-.3-.8-.6-1.1l-.1-.1a1.9 1.9 0 0 1 2.7-2.7l.1.1c.3.3.7.5 1.1.6.4-.2.8-.3 1.2-.5.2-.3.3-.8.3-1.2V2a1.9 1.9 0 0 1 3.8 0v.2c0 .4.1.9.3 1.2.4.1.8.3 1.2.5.4-.1.8-.3 1.1-.6l.1-.1a1.9 1.9 0 0 1 2.7 2.7l-.1.1c-.3.3-.5.7-.6 1.1.2.4.3.8.5 1.2.3.2.8.3 1.2.3h.2a1.9 1.9 0 0 1 0 3.8h-.2c-.4 0-.9.1-1.2.3-.1.4-.3.8-.5 1.2z"></path></svg>
            <span>设置</span>
          </button>
        </nav>
      </section>
    </main>

    <dialog id="entry-dialog" class="entry-dialog">
      <form id="entry-form" method="dialog">
        <header>
          <h2 id="dialog-title">写一篇日记</h2>
          <button id="close-dialog" class="icon-button" type="button">×</button>
        </header>
        <label>
          日期
          <input id="entry-date" type="datetime-local" required />
        </label>
        <label>
          标题
          <input id="entry-title" placeholder="可不填" />
        </label>
        <label>
          内容
          <textarea id="entry-content" required rows="6" placeholder="慢慢写，两个人都会看到。"></textarea>
        </label>
        <label>
          照片
          <input id="entry-photos" type="file" accept="image/*" multiple />
        </label>
        <div id="photo-preview" class="photo-preview"></div>
        <label>
          心情
          <input id="entry-mood" placeholder="可不填，比如 开心、想念、很踏实" />
        </label>
        <label>
          地点
          <input id="entry-location" placeholder="可不填" />
        </label>
        <button class="primary-button" type="submit">保存日记</button>
      </form>
    </dialog>

    <dialog id="name-dialog" class="entry-dialog name-dialog">
      <form id="name-form" method="dialog">
        <header>
          <h2>更改显示名</h2>
          <button id="close-name-dialog" class="icon-button" type="button">×</button>
        </header>
        <label>
          显示名
          <input id="display-name-input" maxlength="12" placeholder="大宝 / 小宝" />
        </label>
        <button class="primary-button" type="submit">保存显示名</button>
      </form>
    </dialog>

    <div id="image-viewer" class="image-viewer hidden">
      <button id="close-image-viewer" class="image-close" type="button">×</button>
      <button id="prev-image" class="image-nav prev" type="button">‹</button>
      <img id="image-viewer-img" alt="日记照片大图" />
      <button id="next-image" class="image-nav next" type="button">›</button>
      <div id="image-counter" class="image-counter"></div>
    </div>

    <script src="./app.js?v=22"></script>
  </body>
</html>
