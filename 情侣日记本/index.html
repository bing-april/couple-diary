<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>情侣日记本</title>
    <link rel="stylesheet" href="./styles.css?v=9" />
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="./config.js?v=1"></script>
  </head>
  <body>
    <main class="phone-shell">
      <section id="auth-screen" class="screen auth-screen">
        <div class="auth-card">
          <p class="eyebrow">Couple Diary</p>
          <h1>满满的日记</h1>
          <p class="auth-subtitle">把两个人的小日子，稳稳保存下来。</p>

          <div class="segmented">
            <button id="show-login" class="segment active" type="button">登录</button>
            <button id="show-signup" class="segment" type="button">注册</button>
          </div>

          <form id="auth-form" class="form">
            <label>
              邮箱
              <input id="email" type="email" autocomplete="email" required placeholder="you@example.com" />
            </label>
            <label>
              密码
              <input id="password" type="password" autocomplete="current-password" required minlength="6" placeholder="至少 6 位" />
            </label>
            <button id="auth-submit" class="primary-button" type="submit">登录</button>
          </form>
          <p id="auth-message" class="message"></p>
        </div>
      </section>

      <section id="app-screen" class="screen app-screen hidden">
        <div class="content">
          <section id="page-diary" class="page active">
            <header class="page-header compact">
              <div>
                <h1>满满的日记</h1>
              </div>
            </header>
            <div class="diary-search">
              <span>
                <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="M16.5 16.5 21 21"></path></svg>
              </span>
              <input id="diary-search-input" type="search" placeholder="搜索日记、心情、地点..." />
            </div>
            <div id="diary-list" class="timeline"></div>
          </section>

          <section id="page-memory" class="page">
            <header class="page-header">
              <h1>记忆回溯</h1>
              <p>特别日子写下的日记</p>
            </header>
            <div class="anniversary-box">
              <label>
                纪念日起点
                <input id="anniversary-date" type="date" />
              </label>
              <button id="save-anniversary" class="outline-button" type="button">保存</button>
            </div>
            <div id="memory-list" class="memory-list"></div>
          </section>

          <section id="page-calendar" class="page">
            <header class="page-header">
              <h1>日历</h1>
              <p>浏览每一天的记录</p>
            </header>
            <div class="calendar-card">
              <div class="calendar-title">
                <button id="prev-month" class="icon-button" type="button">‹</button>
                <h2 id="calendar-month">2026年 5月</h2>
                <button id="next-month" class="icon-button" type="button">›</button>
              </div>
              <div class="weekdays">
                <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
              </div>
              <div id="calendar-grid" class="calendar-grid"></div>
            </div>
          </section>

          <section id="page-settings" class="page">
            <div class="settings-card profile-card">
              <div class="avatar">♙</div>
              <div>
                <div class="profile-name-row">
                  <h2 id="profile-name">宝贝</h2>
                  <button id="edit-name" class="text-icon" type="button">✎</button>
                </div>
                <p id="profile-email">email</p>
              </div>
            </div>

            <div class="settings-card">
              <h3>我的日记颜色</h3>
              <div id="color-picker" class="color-picker"></div>
              <div class="stats">
                <div><strong id="my-count">0</strong><span>篇日记</span></div>
                <div><strong id="photo-count">0</strong><span>张照片</span></div>
              </div>
            </div>

            <div class="settings-card">
              <h3>♡ 情侣日记本</h3>
              <div id="members-list" class="members-list"></div>
              <label class="invite-box">
                邀请码
                <input id="book-code" readonly />
              </label>
              <label class="invite-box">
                加入对方日记本
                <div class="join-row">
                  <input id="join-code" placeholder="粘贴对方邀请码" />
                  <button id="join-book" type="button">加入</button>
                </div>
              </label>
            </div>

            <div class="settings-card">
              <h3>主题颜色</h3>
              <div class="theme-grid">
                <button class="theme-chip active" data-theme="rose" type="button"><span></span>经典</button>
                <button class="theme-chip" data-theme="pink" type="button"><span></span>玫粉</button>
                <button class="theme-chip" data-theme="sakura" type="button"><span></span>樱粉</button>
                <button class="theme-chip" data-theme="ink" type="button"><span></span>水墨</button>
                <button class="theme-chip" data-theme="sea" type="button"><span></span>浅海</button>
              </div>
            </div>

            <div class="settings-card export-card">
              <div>
                <h3>导出日记</h3>
                <p>将当前日记本导出为 PDF 文件</p>
              </div>
              <button id="export-pdf" class="outline-button" type="button">⇩ 导出 PDF</button>
            </div>

            <button id="logout" class="logout-button" type="button">退出登录</button>
            <p class="footer-note">Developed for 满满</p>
          </section>
        </div>

        <button id="new-entry-button" class="floating-button" type="button" aria-label="写日记">✎</button>

        <nav class="tabbar">
          <button class="tab active" data-page="diary" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4.5h6a3 3 0 0 1 3 3v12a3 3 0 0 0-3-3H5z"></path><path d="M19 4.5h-5a3 3 0 0 0-3 3v12a3 3 0 0 1 3-3h5z"></path></svg>
            <span>日记</span>
          </button>
          <button class="tab" data-page="memory" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l1.6 5.1L19 10l-5.4 1.9L12 17l-1.6-5.1L5 10l5.4-1.9z"></path><path d="M18.5 15.5l.7 2.1 2.1.7-2.1.7-.7 2.1-.7-2.1-2.1-.7 2.1-.7z"></path></svg>
            <span>回溯</span>
          </button>
          <button class="tab" data-page="calendar" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3v3"></path><path d="M17 3v3"></path><rect x="4" y="5" width="16" height="15" rx="3"></rect><path d="M4 10h16"></path><path d="M8 14h.01"></path><path d="M12 14h.01"></path><path d="M16 14h.01"></path></svg>
            <span>日历</span>
          </button>
          <button class="tab" data-page="settings" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5z"></path><path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.05.05a2.2 2.2 0 1 1-3.11 3.11l-.05-.05a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.09 1.65v.15a2.2 2.2 0 1 1-4.4 0v-.08a1.8 1.8 0 0 0-1.18-1.68 1.8 1.8 0 0 0-1.98.36l-.05.05a2.2 2.2 0 1 1-3.11-3.11l.05-.05A1.8 1.8 0 0 0 3.3 15a1.8 1.8 0 0 0-1.65-1.09H1.5a2.2 2.2 0 1 1 0-4.4h.08A1.8 1.8 0 0 0 3.26 8.4a1.8 1.8 0 0 0-.36-1.98l-.05-.05A2.2 2.2 0 1 1 5.96 3.25l.05.05a1.8 1.8 0 0 0 1.98.36h.02A1.8 1.8 0 0 0 9.1 2V1.9a2.2 2.2 0 1 1 4.4 0v.08A1.8 1.8 0 0 0 14.6 3.66a1.8 1.8 0 0 0 1.98-.36l.05-.05a2.2 2.2 0 1 1 3.11 3.11l-.05.05a1.8 1.8 0 0 0-.36 1.98v.02A1.8 1.8 0 0 0 21 9.5h.1a2.2 2.2 0 1 1 0 4.4h-.08A1.8 1.8 0 0 0 19.4 15z"></path></svg>
            <span>设置</span>
          </button>
        </nav>
      </section>
    </main>

    <dialog id="entry-dialog" class="entry-dialog">
      <form id="entry-form" method="dialog">
        <header>
          <h2 id="dialog-title">写一篇日记</h2>
          <button id="close-dialog" class="icon-button" type="button">×</button>
        </header>
        <label>
          日期
          <input id="entry-date" type="datetime-local" required />
        </label>
        <label>
          标题
          <input id="entry-title" placeholder="可不填" />
        </label>
        <label>
          内容
          <textarea id="entry-content" required rows="8" placeholder="慢慢写，两个人都会看到。"></textarea>
        </label>
        <label>
          照片
          <input id="entry-photos" type="file" accept="image/*" multiple />
        </label>
        <div id="photo-preview" class="photo-preview"></div>
        <label>
          心情
          <input id="entry-mood" placeholder="可不填，比如 开心、想念、很踏实" />
        </label>
        <label>
          地点
          <input id="entry-location" placeholder="可不填" />
        </label>
        <button class="primary-button" type="submit">保存日记</button>
      </form>
    </dialog>

    <div id="image-viewer" class="image-viewer hidden">
      <button id="close-image-viewer" class="image-close" type="button">×</button>
      <button id="prev-image" class="image-nav prev" type="button">‹</button>
      <img id="image-viewer-img" alt="日记照片大图" />
      <button id="next-image" class="image-nav next" type="button">›</button>
      <div id="image-counter" class="image-counter"></div>
    </div>

    <script src="./app.js?v=10"></script>
  </body>
</html>
